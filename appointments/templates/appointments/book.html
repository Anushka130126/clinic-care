<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow" style="max-width: 500px; margin: auto;">
        <h2 class="mb-4 text-primary text-center">Schedule Visit</h2>
        
        {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Select Doctor</label>
                <select name="doctor_id" class="form-select" required>
                    {% for doctor in doctors %}
                        <option value="{{ doctor.id }}">{{ doctor.name }} - {{ doctor.specialization }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Select Date</label>
                <input type="date" name="appointment_date" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Select Time Slot</label>
                <select name="appointment_time" class="form-select" required>
                    {% for value, display in time_slots %}
                        <option value="{{ value }}">{{ display }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Confirm & Get Token</button>
        </form>
        <div class="text-center mt-3">
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-sm w-100">Logout</button>
            </form>
        </div>
	<div class="d-flex justify-content-between mt-4">
    		<a href="{% url 'patient_dashboard' %}" class="btn btn-outline-secondary shadow-sm">
        		<i class="bi bi-arrow-left"></i> Back to Dashboard
    		</a>
    		<!-- 
		<button type="submit" class="btn btn-primary shadow-sm">
        		<i class="bi bi-calendar-check"></i> Confirm Appointment
    		</button> 
		-->
	</div>
    </div>
</body>
</html>
