<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ClinicCare Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fc; }
        .navbar { background: linear-gradient(90deg, #0d6efd 0%, #0a58ca 100%); }
        .card { border-radius: 12px; border: none; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important; }
        .btn { border-radius: 8px; font-weight: 500; }
        .token-display { font-size: 3rem; font-weight: 700; letter-spacing: -2px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-hospital me-2"></i>ClinicCare System</a>
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-white me-4"><i class="bi bi-person-circle me-1"></i> Hello, {{ user.username|title }}</span>
                    
                    {% if user.is_staff and request.resolver_match.url_name != 'clinic_reports' %}
                        <a href="{% url 'clinic_reports' %}" class="btn btn-sm btn-light text-primary me-2"><i class="bi bi-graph-up"></i> Analytics</a>
                    {% endif %}
                    
                    <form method="POST" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right"></i> Logout</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Gets today's date and formats it as YYYY-MM-DD
            let today = new Date().toISOString().split('T')[0];

            // Find every date input on the website and set the 'min' attribute
            let dateInputs = document.querySelectorAll('input[type="date"]');
            dateInputs.forEach(function(input) {
                input.setAttribute('min', today);
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
