<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-4" style="max-width: 500px; width: 100%;">
        <h3 class="text-primary mb-4 text-center">Update Your Profile</h3>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                {{ u_form.email }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                {{ p_form.phone_number }}
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Medical History</label>
                {{ p_form.medical_history }}
                <div class="form-text">List any known allergies or past conditions.</div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-2">Save Profile</button>
            <a href="{% url 'patient_dashboard' %}" class="btn btn-outline-secondary w-100">Cancel</a>
        </form>
    </div>
</body>
</html>
