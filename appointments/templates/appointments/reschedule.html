
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reschedule Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
        <h3 class="text-center text-primary mb-3">Reschedule</h3>
        <p class="text-center text-muted mb-4">Dr. {{ appointment.doctor.name }}</p>
        
        {% if error %}<div class="alert alert-danger p-2 text-center">{{ error }}</div>{% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">New Date</label>
                <input type="date" name="appointment_date" class="form-control" value="{{ appointment.appointment_date|date:'Y-m-d' }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label">New Time Slot</label>
                <select name="appointment_time" class="form-select" required>
                    {% for value, display in time_slots %}
                        <option value="{{ value }}" {% if value == appointment.appointment_time %}selected{% endif %}>{{ display }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100 mb-2">Confirm Changes</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary w-100">Cancel</a>
        </form>
    </div>
</body>
</html>
