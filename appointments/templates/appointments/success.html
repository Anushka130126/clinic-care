<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg text-center p-5" style="max-width: 500px;">
        <div class="card-body">
            <h2 class="text-success mb-3">Booking Confirmed!</h2>
            <p class="text-muted mb-4">Your appointment has been successfully scheduled.</p>
            <div class="p-4 bg-primary text-white rounded mb-4">
                <h5 class="mb-0">Your Token Number</h5>
                <h1 class="display-1 fw-bold">{{ token_number }}</h1>
            </div>
            <a href="/appointments/book/" class="btn btn-outline-primary w-100">Book Another Appointment</a>
        </div>
    </div>
</body>
</html>
