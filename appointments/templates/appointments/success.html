{% extends 'appointments/base.html' %}

{% block title %}Booking Confirmed{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow border-success border-top border-4">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mt-3">Appointment Confirmed!</h2>
                <p class="text-muted">Your booking has been secured and your mock SMS has been dispatched.</p>

                <div class="bg-light rounded p-4 my-4 border">
                    <h5 class="text-muted mb-2 text-uppercase small fw-bold">Your Queue Token</h5>
                    <h1 class="display-1 text-success fw-bold m-0">#{{ token_number }}</h1>
                </div>

                <div class="d-grid gap-2">
                    <a href="{% url 'patient_dashboard' %}" class="btn btn-primary shadow-sm">View My Dashboard</a>
                    <a href="{% url 'book_appointment' %}" class="btn btn-outline-secondary shadow-sm">Book Another Visit</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
