<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-4" style="max-width: 450px; width: 100%;">
        <h3 class="text-warning mb-3 text-center">Change Password</h3>
        <p class="text-muted text-center mb-4">Please enter your old password, for security's sake, and then enter your new password twice so we can verify you typed it in correctly.</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning w-100 mt-2">Change My Password</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</body>
</html>
