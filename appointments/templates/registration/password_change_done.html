<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Changed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-5 text-center" style="max-width: 400px; width: 100%;">
        <h1 class="display-1 text-success mb-3">✓</h1>
        <h3 class="text-dark">Password Updated</h3>
        <p class="text-muted">Your password has been changed successfully. Please log in again using your new credentials.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 mt-3">Back to Login</a>
    </div>
</body>
</html>
