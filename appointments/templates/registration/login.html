<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClinicCare Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-5" style="max-width: 400px; width: 100%;">
        <h3 class="text-center text-primary mb-4">ClinicCare Portal</h3>
        <p class="text-center text-muted mb-4">Log in to access your dashboard</p>
        
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            {% if axes_warning %}
            <div class="alert alert-danger fw-bold text-center mt-3 shadow-sm border-danger" role="alert">
                <i class="bi bi-shield-exclamation me-2"></i> {{ axes_warning }}
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100 mt-3">Log In</button>
        </form>
        
        <hr class="my-4">
        <div class="text-center">
            <p class="mb-1">Are you a new patient?</p>
            <a href="{% url 'register' %}" class="btn btn-outline-success btn-sm w-100">Sign Up Here</a>
        </div>
    </div>
</body>
</html>
